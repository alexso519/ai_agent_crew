[project]
name = "crew-runtime"
version = "1.0.0"
description = "CrewAI runtime abstraction for enterprise control center"
requires-python = ">=3.12"
dependencies = [
    "crewai>=0.86.0",
    "redis>=5.2.0",
    "pydantic>=2.10.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
